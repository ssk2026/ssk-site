{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="sub-hero sub-hero--performance">
    <div class="sub-hero-overlay"></div>
    <div class="sub-hero-content">
        <h1>연구성과</h1>
    </div>
</section>

<nav class="sub-nav-wrap">
    <ul class="sub-nav-menu">
        <li class="{% if request.resolver_match.url_name == 'performance_business_plan' %}active{% endif %}">
            <a href="{% url 'performance_business_plan' %}">연구계획서</a>
        </li>
        <li class="{% if request.resolver_match.url_name == 'performance_papers' %}active{% endif %}">
            <a href="{% url 'performance_papers' %}">학술 논문 및 저서</a>
        </li>
        <li class="{% if request.resolver_match.url_name == 'performance_briefing' %}active{% endif %}">
            <a href="{% url 'performance_briefing' %}">학술대회 발표</a>
        </li>
    </ul>
</nav>

<style>
    .plan-wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 48px 20px 100px;
    }
    .plan-title {
        text-align: center;
        font-size: 52px;
        font-weight: 800;
        margin: 0 0 36px;
        color: #1f1f1f;
    }
    .pdf-stage {
        position: relative;
        background: #e9e9e9;
        border-radius: 8px;
        padding: 42px 84px 28px;
        min-height: 760px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .pdf-view {
        width: 100%;
        max-width: 760px;
        min-height: 640px;
        background: #fff;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        border: 1px solid #ececec;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    #proposalCanvas {
        width: 100%;
        height: auto;
        display: block;
    }
    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 52px;
        height: 52px;
        border: 0;
        background: rgba(180, 180, 180, 0.9);
        color: #fff;
        font-size: 28px;
        line-height: 1;
        cursor: pointer;
    }
    .nav-btn:hover { background: rgba(150, 150, 150, 0.95); }
    .nav-btn:disabled { opacity: 0.45; cursor: default; }
    .nav-btn.prev { left: 24px; }
    .nav-btn.next { right: 24px; }
    .page-meta {
        text-align: center;
        margin-top: 14px;
        font-size: 24px;
        font-weight: 700;
        color: #111;
    }
    .empty-box {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px;
        background: #f6f6f6;
        border: 1px solid #e2e2e2;
        border-radius: 10px;
        font-size: 18px;
        line-height: 1.7;
    }
    @media (max-width: 960px) {
        .plan-title { font-size: 38px; }
        .pdf-stage { padding: 32px 56px 20px; min-height: 620px; }
        .nav-btn { width: 44px; height: 44px; font-size: 24px; }
        .nav-btn.prev { left: 10px; }
        .nav-btn.next { right: 10px; }
    }
</style>

<section class="plan-wrap">

    {% if proposal_file_url %}
    <div class="pdf-stage">
        <button id="prevPageBtn" class="nav-btn prev" type="button" aria-label="이전 페이지">&larr;</button>

        <div class="pdf-view" id="pdfView">
            <canvas id="proposalCanvas" aria-label="연구계획서 페이지"></canvas>
        </div>

        <button id="nextPageBtn" class="nav-btn next" type="button" aria-label="다음 페이지">&rarr;</button>
    </div>
    <div class="page-meta">
        <span id="currentPage">{{ initial_page }}</span> / <span id="totalPages">-</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        (function () {
            const pdfUrl = "{{ proposal_file_url|escapejs }}";
            const initialPage = Number("{{ initial_page }}") || 1;
            const canvas = document.getElementById("proposalCanvas");
            const ctx = canvas.getContext("2d");
            const prevBtn = document.getElementById("prevPageBtn");
            const nextBtn = document.getElementById("nextPageBtn");
            const currentPageEl = document.getElementById("currentPage");
            const totalPagesEl = document.getElementById("totalPages");
            const pdfView = document.getElementById("pdfView");

            let pdfDoc = null;
            let currentPage = initialPage;
            let rendering = false;

            pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

            function updateButtons() {
                prevBtn.disabled = currentPage <= 1 || rendering;
                nextBtn.disabled = !pdfDoc || currentPage >= pdfDoc.numPages || rendering;
                currentPageEl.textContent = String(currentPage);
                totalPagesEl.textContent = pdfDoc ? String(pdfDoc.numPages) : "-";
            }

            async function renderPage(pageNum) {
                if (!pdfDoc || rendering) return;
                rendering = true;
                updateButtons();

                const page = await pdfDoc.getPage(pageNum);
                const unscaled = page.getViewport({ scale: 1 });
                const availableWidth = pdfView.clientWidth - 2;
                const scale = availableWidth / unscaled.width;
                const viewport = page.getViewport({ scale });

                canvas.width = Math.floor(viewport.width);
                canvas.height = Math.floor(viewport.height);

                await page.render({ canvasContext: ctx, viewport }).promise;

                rendering = false;
                updateButtons();
            }

            async function init() {
                try {
                    const loadingTask = pdfjsLib.getDocument(pdfUrl);
                    pdfDoc = await loadingTask.promise;
                    currentPage = Math.min(Math.max(currentPage, 1), pdfDoc.numPages);
                    await renderPage(currentPage);
                } catch (e) {
                    pdfView.innerHTML = "<div style='padding:24px;font-size:16px;'>PDF를 불러오지 못했습니다.</div>";
                }
            }

            prevBtn.addEventListener("click", async function () {
                if (!pdfDoc || rendering || currentPage <= 1) return;
                currentPage -= 1;
                await renderPage(currentPage);
            });

            nextBtn.addEventListener("click", async function () {
                if (!pdfDoc || rendering || currentPage >= pdfDoc.numPages) return;
                currentPage += 1;
                await renderPage(currentPage);
            });

            window.addEventListener("resize", function () {
                if (pdfDoc && !rendering) {
                    renderPage(currentPage);
                }
            });

            init();
        })();
    </script>
    {% else %}
    <div class="empty-box">
        등록된 연구계획서 PDF가 없습니다.<br>
        파일을 <code>media/proposals/</code> 폴더에 업로드하면 이 페이지에서 바로 표시됩니다.
    </div>
    {% endif %}
</section>

{% endblock %}
