{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="sub-hero sub-hero--performance">
    <div class="sub-hero-overlay"></div>
    <div class="sub-hero-content">
        <h1>연구성과</h1>
    </div>
</section>

<nav class="sub-nav-wrap">
    <ul class="sub-nav-menu">
        <li class="{% if request.resolver_match.url_name == 'performance_business_plan' %}active{% endif %}">
            <a href="{% url 'performance_business_plan' %}">연구계획서</a>
        </li>
        <li class="{% if request.resolver_match.url_name == 'performance_papers' %}active{% endif %}">
            <a href="{% url 'performance_papers' %}">학술 논문 및 저서</a>
        </li>
        <li class="{% if request.resolver_match.url_name == 'performance_briefing' %}active{% endif %}">
            <a href="{% url 'performance_briefing' %}">학술대회 발표</a>
        </li>
    </ul>
</nav>

<section class="subpage-wrap">
    <div class="container">
        <div class="subpage-content subpage-content--full">
            <h2>학술 논문 및 저서</h2>
            <div class="title-line"></div>

            <div class="year-block">
                <h3 class="year-title">2026</h3>
                <ol class="paper-list">
                    <li>추가 예정</li>
                </ol>
            </div>
        </div>
    </div>
</section>

{% endblock %}
