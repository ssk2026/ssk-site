{% extends "base.html" %}

{% block content %}
<section class="sub-hero sub-hero--info">
    <div class="sub-hero-overlay"></div>
    <div class="sub-hero-content">
        <h1>정보 마당</h1>
    </div>
</section>

<nav class="sub-nav-wrap">
    <ul class="sub-nav-menu">
        <li>
            <a href="{% url 'notice_list' %}">공지사항</a>
        </li>
        <li class="active">
            <a href="{% url 'contact' %}">문의</a>
        </li>
    </ul>
</nav>

<section class="contact-section">
    <div class="contact-wrapper">
        <div class="contact-form">
            <h2>문의하기</h2>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="name" placeholder="이름" required>
                <input type="email" name="email" placeholder="이메일" required>
                <input type="text" name="subject" placeholder="제목" required>
                <textarea name="message" rows="7" placeholder="문의 내용을 입력해 주세요." required></textarea>
                <button type="submit">문의 등록</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
